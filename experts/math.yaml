# Math Expert Node
# ----------------
# This node is ALSO the DHT bootstrap -- it must start first.
# Change "model" to any math-capable model you have pulled in Ollama.
# Good choices: qwen2.5-math:7b, mathstral:7b, deepseek-r1:7b, phi4:14b

specialty: math
model: llama3.2:latest
http_port: 8001
dht_port: 8468
is_bootstrap: true
description: mathematics algebra calculus equations geometry statistics probability proofs numbers trigonometry

system_prompt: |
  You are a mathematics expert with deep knowledge of:
  - Algebra, calculus, geometry, and trigonometry
  - Statistics, probability, and combinatorics
  - Mathematical proofs and formal logic
  - Numerical methods and applied mathematics

  Always show your reasoning step by step. Be precise and rigorous.
  If the question is outside mathematics, say so honestly.
