name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            zip_name: MoE-Network-Windows.zip
            shell_bin: moe.exe
            backend_bin: backend.exe

          - os: macos-latest
            zip_name: MoE-Network-macOS.zip
            shell_bin: moe
            backend_bin: backend

          - os: ubuntu-latest
            zip_name: MoE-Network-Linux.zip
            shell_bin: moe
            backend_bin: backend

    steps:
      - uses: actions/checkout@v4

      # ── Toolchains ────────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      # ── Linux system deps (pystray needs GTK) ────────────────────────────
      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgirepository1.0-dev gir1.2-appindicator3-0.1

      # ── Python deps ───────────────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      # ── Write version from tag ────────────────────────────────────────────
      - name: Write version.txt
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "$VERSION" > version.txt
          echo "Building version $VERSION"

      # ── Full build (UI + backend + Go shell) ──────────────────────────────
      - name: Build
        run: python build.py

      # ── Package ───────────────────────────────────────────────────────────
      - name: Zip (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path dist\${{ matrix.shell_bin }}, dist\${{ matrix.backend_bin }}, dist\experts `
            -DestinationPath ${{ matrix.zip_name }}

      - name: Zip (macOS / Linux)
        if: matrix.os != 'windows-latest'
        run: |
          cd dist
          zip -r ../${{ matrix.zip_name }} ${{ matrix.shell_bin }} ${{ matrix.backend_bin }} experts/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.zip_name }}
          path: ${{ matrix.zip_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          name: "MoE Network ${{ github.ref_name }}"
          body: |
            ## MoE Network ${{ github.ref_name }}

            Download the zip for your OS, unzip it, and double-click `moe` (or `moe.exe` on Windows).

            ### Requirements
            - [Ollama](https://ollama.com/download) must be installed and running
            - Pull the models your experts need (the setup wizard will guide you)

            ### Install
            1. Download and unzip for your OS
            2. **Windows**: double-click `moe.exe`
            3. **macOS / Linux**: `chmod +x moe && ./moe`
            4. The setup wizard appears on first launch
            5. Look for the tray icon (bottom-right on Windows, menu bar on macOS)

            ### Notes
            - No admin / root permissions required
            - macOS: if you see "unidentified developer", right-click → Open
          files: |
            MoE-Network-Windows.zip/MoE-Network-Windows.zip
            MoE-Network-macOS.zip/MoE-Network-macOS.zip
            MoE-Network-Linux.zip/MoE-Network-Linux.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
