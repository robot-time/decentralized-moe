# .github/workflows/release.yml
# ================================
# Automatically builds the app for Windows and macOS
# whenever you push a version tag (e.g. v1.1.0).
#
# How to trigger a release:
#   git tag v1.1.0
#   git push origin v1.1.0

name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: MoE-Network.exe
            zip_name: MoE-Network-Windows.zip

          - os: macos-latest
            artifact_name: MoE-Network.app
            zip_name: MoE-Network-macOS.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Write version.txt from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "$VERSION" > version.txt
          echo "Building version $VERSION"

      - name: Build with PyInstaller
        run: python build.py

      - name: Ad-hoc sign macOS app
        if: matrix.os == 'macos-latest'
        run: |
          # Remove any quarantine flags from the CI environment first
          xattr -cr dist/MoE-Network.app || true
          # Ad-hoc sign (-) so Gatekeeper sees a valid signature and won't
          # report the app as "damaged".  Does NOT require an Apple account.
          codesign --deep --force --sign - dist/MoE-Network.app

      - name: Zip macOS app
        if: matrix.os == 'macos-latest'
        run: cd dist && zip -r ../${{ matrix.zip_name }} MoE-Network.app

      - name: Zip Windows exe
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Compress-Archive -Path dist\MoE-Network.exe -DestinationPath ${{ matrix.zip_name }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.zip_name }}
          path: ${{ matrix.zip_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4

      - name: Create Release with all platform builds
        uses: softprops/action-gh-release@v2
        with:
          name: "MoE Network ${{ github.ref_name }}"
          body: |
            ## MoE Network ${{ github.ref_name }}

            Download the version for your operating system below.

            ### Install
            1. Download the zip for your OS
            2. Unzip it
            3. **Make sure [Ollama](https://ollama.com/download) is installed**
            4. Double-click `MoE-Network.exe` (Windows) or `MoE-Network.app` (macOS)
            5. Follow the setup wizard

            ### Notes
            - No admin / root permissions needed
            - macOS: if you see "unidentified developer", right-click > Open
          files: |
            MoE-Network-Windows.zip/MoE-Network-Windows.zip
            MoE-Network-macOS.zip/MoE-Network-macOS.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
